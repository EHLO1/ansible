---
# Ubuntu/Debian package updates. This is the one place the distro leaks
# through: these tasks use apt. A Fedora host would need a dnf equivalent
# (see README), which is why Fedora gets its own inventory group.

- name: Update apt cache and upgrade all packages
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
    upgrade: dist
  # 'dist' is a full-upgrade: installs/removes packages as needed to satisfy
  # dependencies, which is what you want for a real OS update.

- name: Remove now-unused packages
  ansible.builtin.apt:
    autoremove: true

- name: Check whether a reboot is required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: baseline_reboot_file

- name: Reboot if the kernel or core libraries require it
  ansible.builtin.reboot:
    msg: Rebooting via Ansible to finish applying updates
  when:
    - baseline_reboot_if_required
    - baseline_reboot_file.stat.exists
  # The reboot module waits for the host to come back before continuing,
  # so a `site.yml` run safely proceeds to the docker play afterward.
